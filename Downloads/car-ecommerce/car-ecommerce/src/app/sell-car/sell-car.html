<div class="min-h-screen bg-slate-50">
  <div class="max-w-4xl mx-auto px-6 lg:px-16 py-12">
    <div class="mb-8">
      <a routerLink="/" class="text-blue-600 hover:text-blue-700 font-medium">← Back to Home</a>
    </div>
    
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h1 class="text-4xl font-bold mb-4">Sell Your Car</h1>
      <p class="text-slate-600 mb-8">Get an instant valuation and sell your car in minutes</p>
      
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Make</label>
          <select class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            <option>Select Make</option>
            <option>Toyota</option>
            <option>BMW</option>
            <option>Mercedes</option>
            <option>Audi</option>
            <option>Tesla</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Model</label>
          <input type="text" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter model">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Year</label>
          <input type="number" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="2020">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Mileage</label>
          <input type="number" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="50000">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Get Valuation
        </button>
      </form>
    </div>
  </div>
</div>
