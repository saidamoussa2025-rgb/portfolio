<div class="min-h-screen bg-slate-50">
  <div class="max-w-4xl mx-auto px-6 lg:px-16 py-12">
    <div class="mb-8">
      <a routerLink="/" class="text-blue-600 hover:text-blue-700 font-medium">← Back to Home</a>
    </div>
    
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h1 class="text-4xl font-bold mb-4">Financing Options</h1>
      <p class="text-slate-600 mb-8">Get pre-qualified for financing in minutes. No commitment required.</p>
      
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Annual Income</label>
          <input type="number" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="$50,000">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Credit Score</label>
          <select class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            <option>Select Range</option>
            <option>Excellent (750+)</option>
            <option>Good (700-749)</option>
            <option>Fair (650-699)</option>
            <option>Below 650</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Down Payment</label>
          <input type="number" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="$5,000">
        </div>
        
        <button
          type="button"
          (click)="goToPreQualification()"
          class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Get Pre-Qualified
        </button>
      </form>
    </div>
  </div>
</div>
