<div class="min-h-screen bg-slate-50">
  <div class="max-w-7xl mx-auto px-6 lg:px-16 py-8">
    <div class="mb-6">
      <a routerLink="/cars" class="text-blue-600 hover:text-blue-700 font-medium">← Back to Cars</a>
    </div>
    
    @if (car) {
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="grid md:grid-cols-2 gap-8 p-8">
          <div>
            <img [src]="car.image" [alt]="car.make + ' ' + car.model" class="w-full rounded-xl">
          </div>
          
          <div>
            <h1 class="text-4xl font-bold mb-2">{{ car.year }} {{ car.make }} {{ car.model }}</h1>
            <p class="text-3xl font-bold text-blue-600 mb-6">${{ car.price | number:'1.0-0' }}</p>
            
            <div class="space-y-4 mb-6">
              <div class="flex items-center gap-4">
                <span class="text-slate-600">Mileage:</span>
                <span class="font-medium">{{ car.mileage }}</span>
              </div>
              <div class="flex items-center gap-4">
                <span class="text-slate-600">Fuel Type:</span>
                <span class="font-medium">{{ car.fuel }}</span>
              </div>
              <div class="flex items-center gap-4">
                <span class="text-slate-600">Drive:</span>
                <span class="font-medium">{{ car.drive }}</span>
              </div>
            </div>
            
            <p class="text-slate-600 mb-6">{{ car.description }}</p>
            
            <div class="flex gap-4">
              <button
                routerLink="/contact-seller"
                class="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
                Contact Seller
              </button>
              <button routerLink="/financing" class="flex-1 border-2 border-blue-600 text-blue-600 py-3 rounded-lg hover:bg-blue-50 transition font-medium">
                Get Financing
              </button>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
        <p class="text-xl text-slate-600">Car not found</p>
      </div>
    }
  </div>
</div>
