<div class="min-h-screen bg-slate-50">
  <div class="max-w-3xl mx-auto px-6 lg:px-16 py-16">
    <div class="bg-white rounded-2xl shadow-lg p-10 space-y-6">
      <h1 class="text-3xl font-bold text-slate-900">Contact the seller</h1>
      <p class="text-slate-600">
        Send a message to the seller to ask questions about this vehicle or request more details.
      </p>

      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Your name</label>
          <input class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Your email</label>
          <input type="email" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Message</label>
          <textarea rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Hi, I’m interested in this car. Is it still available?"></textarea>
        </div>
        <button type="button" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Send message
        </button>
      </form>
    </div>
  </div>
</div>
