<div class="min-h-screen bg-slate-50 flex items-center justify-center px-6 py-12">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-3xl font-bold mb-2">Get Started</h1>
    <p class="text-slate-600 mb-8">Create your LuxeWheels account</p>
    
    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
        <input type="text" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="John Doe">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
        <input type="email" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="your@email.com">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
        <input type="password" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••••">
      </div>
      
      <button
        type="button"
        (click)="onCreateAccount()"
        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
        Create Account
      </button>
    </form>
    
    <p class="mt-6 text-center text-slate-600">
      Already have an account? 
      <a routerLink="/signin" class="text-blue-600 hover:underline font-medium">Sign In</a>
    </p>
    
    <a routerLink="/" class="block mt-4 text-center text-slate-600 hover:text-slate-900">← Back to Home</a>
  </div>
</div>
