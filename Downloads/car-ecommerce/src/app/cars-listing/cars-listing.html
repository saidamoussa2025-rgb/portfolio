<div class="min-h-screen bg-slate-50">
  <!-- Header Section -->
  <div class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 lg:px-16 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold">Search Results</h1>
          <p class="text-slate-600 mt-1">{{ totalCars }} cars available</p>
        </div>
        <a routerLink="/" class="text-blue-600 hover:text-blue-700 font-medium">
          ← Back to Home
        </a>
      </div>
    </div>
  </div>

  <!-- Cars Grid -->
  <div class="max-w-7xl mx-auto px-6 lg:px-16 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      @for (car of cars; track car) {
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
          <img [src]="car.image" [alt]="car.make + ' ' + car.model" class="w-full h-48 object-cover">
          <div class="p-4">
            <h3 class="text-xl font-bold">{{ car.year }} {{ car.make }} {{ car.model }}</h3>
            <p class="text-2xl font-bold text-blue-600 mt-2">${{ car.price | number:'1.0-0' }}</p>
            <div class="mt-4 flex flex-wrap gap-4 text-sm text-slate-600">
              <span>{{ car.mileage }}</span>
              <span>{{ car.fuel }}</span>
              <span>{{ car.drive }}</span>
            </div>
            <button [routerLink]="['/car', $index + 1]" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
              View Details
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
